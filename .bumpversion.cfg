[bumpversion]
current_version = 6.0.0
tag = false
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)
serialize = 
	{major}.{minor}.{patch}

[bumpversion:file:Directory.Build.props]
search = <Version>{current_version}</Version>
replace = <Version>{new_version}</Version>

[bumpversion:file:src/Torrentarr.Core/Configuration/TorrentarrConfig.cs]
search = public string ConfigVersion {{ get; set; }} = "{current_version}";
replace = public string ConfigVersion {{ get; set; }} = "{new_version}";

[bumpversion:file:docs/index.md]
search = **Latest Release**: v{current_version}
replace = **Latest Release**: v{new_version}

[bumpversion:file:src/Torrentarr.Core/Configuration/ConfigurationLoader.cs]
search = public const string ExpectedConfigVersion = "{current_version}";
replace = public const string ExpectedConfigVersion = "{new_version}";

[bumpversion:file:config.example.toml]
search = ConfigVersion = "{current_version}"
replace = ConfigVersion = "{new_version}"
