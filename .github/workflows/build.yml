name: Build and Test

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: [10.0.x]
        node-version: ['20']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.1.0
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm
        cache-dependency-path: webui/package-lock.json

    - name: Restore .NET dependencies
      run: dotnet restore

    - name: Install webui dependencies
      working-directory: webui
      run: npm ci

    - name: Run frontend tests
      working-directory: webui
      run: npm test -- --run

    - name: Build webui (production)
      working-directory: webui
      run: npm run build

    - name: Build .NET solution
      run: dotnet build --configuration Release --no-restore

    - name: Run .NET tests (non-live)
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Live"

    - name: Upload build artifacts
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v7
      with:
        name: torrentarr-build
        path: src/*/bin/Release/
        retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      packages: write
      contents: read

    steps:
    - id: repo
      uses: ASzc/change-string-case-action@v6
      with:
        string: ${{ github.repository }}

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          feramance/torrentarr
          ghcr.io/${{ steps.repo.outputs.lowercase }}
        tags: |
          type=raw,value=latest
          type=sha,prefix=

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.1.0
      with:
        dotnet-version: 10.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: webui/package-lock.json

    - name: Install webui dependencies
      working-directory: webui
      run: npm ci

    - name: Lint frontend code
      working-directory: webui
      run: npm run lint || true

    - name: Format check .NET code
      run: dotnet format --verify-no-changes --verbosity diagnostic || true
