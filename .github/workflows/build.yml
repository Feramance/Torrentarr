name: Build and Test

on:
  push:
    branches: [master, main, develop, releases/**]
  pull_request:
    branches: [master, main, develop, releases/**]
  schedule:
  - cron: 0 0 * * *
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: write

env:
  PROJECT_NAME: Torrentarr

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['20']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set .NET version from repo
      id: dotnet_version
      run: |
        DOTNET_VERSION=$(bash scripts/ensure-global-json.sh "${{ github.workspace }}")
        echo "version=$DOTNET_VERSION" >> $GITHUB_OUTPUT
        echo "DOTNET_SDK_VERSION=$DOTNET_VERSION" >> $GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: ${{ env.DOTNET_SDK_VERSION }}.x

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm
        cache-dependency-path: webui/package-lock.json

    - name: Restore .NET dependencies
      run: dotnet restore

    - name: Install webui dependencies
      working-directory: webui
      run: npm ci

    - name: Run frontend tests
      working-directory: webui
      run: npm test -- --run

    - name: Build webui (production)
      working-directory: webui
      run: npm run build

    - name: Build .NET solution
      run: dotnet build --configuration Release --no-restore

    - name: Run .NET tests (non-live)
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Live"

    - name: Upload build artifacts
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v7
      with:
        name: torrentarr-build
        path: src/*/bin/Release/
        retention-days: 7

  docker-nightly:
    name: Build and push Docker image (nightly)
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      packages: write
      contents: read

    steps:
    - id: repo
      uses: ASzc/change-string-case-action@v6
      with:
        string: ${{ github.repository }}

    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && format('refs/heads/{0}', github.event.repository.default_branch) || github.ref }}
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          feramance/torrentarr
          ghcr.io/${{ steps.repo.outputs.lowercase }}
        tags: |
          type=raw,value=nightly

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  docker-pr:
    name: Build and push Docker image (PR)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      packages: write
      contents: read

    steps:
    - id: repo
      uses: ASzc/change-string-case-action@v6
      with:
        string: ${{ github.repository }}

    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ steps.repo.outputs.lowercase }}
        tags: |
          type=raw,value=pr-${{ github.event.pull_request.number }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set .NET version from repo
      id: dotnet_version
      run: |
        DOTNET_VERSION=$(bash scripts/ensure-global-json.sh "${{ github.workspace }}")
        echo "DOTNET_SDK_VERSION=$DOTNET_VERSION" >> $GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: ${{ env.DOTNET_SDK_VERSION }}.x

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: webui/package-lock.json

    - name: Install webui dependencies
      working-directory: webui
      run: npm ci

    - name: Lint frontend code
      working-directory: webui
      run: npm run lint || true

    - name: Format check .NET code
      run: dotnet format --verify-no-changes --verbosity diagnostic || true
