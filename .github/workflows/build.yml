name: Build and Test

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x']
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Restore .NET dependencies
      run: dotnet restore

    - name: Build .NET solution
      run: dotnet build --configuration Release --no-restore

    - name: Run .NET tests (non-live)
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Live"

    - name: Install webui dependencies
      working-directory: webui
      run: npm ci

    - name: Run frontend tests
      working-directory: webui
      run: npm test -- --run

    - name: Build webui (production)
      working-directory: webui
      run: npm run build

    - name: Upload build artifacts
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: torrentarr-build
        path: |
          src/*/bin/Release/
          webui/dist/
        retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: docker build -t torrentarr:test .

    - name: Test Docker image
      run: |
        docker run -d --name torrentarr-test -p 6969:6969 torrentarr:test
        sleep 10
        curl -f http://localhost:6969/health || exit 1
        docker stop torrentarr-test

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install webui dependencies
      working-directory: webui
      run: npm ci

    - name: Lint frontend code
      working-directory: webui
      run: npm run lint || true  # Continue even if lint fails (until rules are configured)
