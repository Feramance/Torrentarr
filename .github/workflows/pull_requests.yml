name: PR Build Checks

on:
  pull_request:
    branches:
    - master
    - releases/**

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  PROJECT_NAME: Torrentarr

jobs:
  build:
    if: github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
        - os: ubuntu-latest
          artifact_name: linux-x64
        - os: windows-latest
          artifact_name: win-x64
        - os: macos-latest
          artifact_name: osx-x64
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.1.0
      with:
        dotnet-version: 10.0.x
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: webui/package-lock.json
    - name: Restore .NET dependencies
      run: dotnet restore
    - name: Install webui dependencies
      working-directory: webui
      run: npm ci
    - name: Run frontend tests
      working-directory: webui
      run: npm test -- --run
    - name: Build webui (production)
      working-directory: webui
      run: npm run build
    - name: Build .NET solution
      run: dotnet build --configuration Release --no-restore
    - name: Run .NET tests (non-live)
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Live"

  docker_build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
    - id: repo
      uses: ASzc/change-string-case-action@v6
      with:
        string: ${{ github.repository }}
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ steps.repo.outputs.lowercase }}
        tags: type=ref,event=pr
    - name: Build Docker image (no push)
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
