name: Create a Release

on:
  push:
    branches:
    - master
  workflow_dispatch:
    inputs:
      release_type:
        description: SemVer segment to bump
        type: choice
        default: patch
        options:
        - patch
        - minor
        - major

defaults:
  run:
    shell: bash

permissions:
  contents: write
  packages: write

env:
  PROJECT_NAME: Torrentarr

jobs:
  prepare_release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message || '', '[patch]') ||
      startsWith(github.event.head_commit.message || '', '[minor]') ||
      startsWith(github.event.head_commit.message || '', '[major]')
    outputs:
      release_type: ${{ steps.release_type.outputs.value }}
      new_version: ${{ steps.version.outputs.value }}
      release_hash: ${{ steps.release_hash.outputs.value }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Determine release type
      id: release_type
      env:
        EVENT_NAME: ${{ github.event_name }}
        COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type || '' }}
      run: |
        if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
          type="${INPUT_RELEASE_TYPE:-patch}"
          echo "value=${type}" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        case "${COMMIT_MESSAGE}" in
          "[patch]"*)
            type="patch"
            ;;
          "[minor]"*)
            type="minor"
            ;;
          "[major]"*)
            type="major"
            ;;
          *)
            echo "Commit message must begin with [patch], [minor], or [major]." >&2
            exit 1
            ;;
        esac

        echo "value=${type}" >> "${GITHUB_OUTPUT}"
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install bump2version
      run: python -m pip install --upgrade pip bump2version
    - name: Bump project version
      env:
        RELEASE_TYPE: ${{ steps.release_type.outputs.value }}
      run: bump2version "${RELEASE_TYPE}"
    - name: Update all version fields
      run: |
        VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
        sed -i "s|<FileVersion>[^<]*</FileVersion>|<FileVersion>${VERSION}</FileVersion>|" Directory.Build.props
        sed -i "s|<AssemblyVersion>[^<]*</AssemblyVersion>|<AssemblyVersion>${VERSION}.0</AssemblyVersion>|" Directory.Build.props
        echo "Updated all version fields to ${VERSION}"
    - name: Capture new version
      id: version
      run: |
        VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
        echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"
        echo "New version: ${VERSION}"
    - name: Commit version bump
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: '[skip ci] Bump version to v${{ steps.version.outputs.value }}'
        commit_user_name: ${{ github.actor }}
        commit_user_email: ${{ github.actor }}@users.noreply.github.com
    - name: Capture release hash
      id: release_hash
      run: |
        HASH=$(git rev-parse --short HEAD)
        echo "value=${HASH}" >> "${GITHUB_OUTPUT}"
        echo "Release hash: ${HASH}"

  create_release:
    name: Create GitHub release draft
    runs-on: ubuntu-latest
    needs:
    - prepare_release
    if: needs.prepare_release.result == 'success'
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Check if release exists
      id: check_release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${{ needs.prepare_release.outputs.new_version }}"
        if gh release view "${TAG}" --repo ${{ github.repository }} >/dev/null 2>&1; then
          echo "exists=true" >> "${GITHUB_OUTPUT}"
          echo "Release ${TAG} already exists, will not create duplicate"
        else
          echo "exists=false" >> "${GITHUB_OUTPUT}"
          echo "Release ${TAG} does not exist, will create"
        fi
    - name: Create draft release
      if: steps.check_release.outputs.exists != 'true'
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: v${{ needs.prepare_release.outputs.new_version }}
        name: v${{ needs.prepare_release.outputs.new_version }}
        draft: true
        prerelease: false
        make_latest: false

  build_binaries:
    name: Build and attach binaries
    runs-on: ubuntu-latest
    needs:
    - prepare_release
    - create_release
    if: needs.prepare_release.result == 'success'
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: webui/package-lock.json
    - name: Install webui dependencies
      working-directory: webui
      run: npm ci
    - name: Build webui (production)
      working-directory: webui
      run: npm run build
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Publish binaries (all RIDs)
      run: |
        mkdir -p release
        for rid in linux-x64 linux-arm64 win-x64 osx-x64 osx-arm64; do
          dotnet publish src/Torrentarr.Host/Torrentarr.Host.csproj \
            -c Release \
            -r "$rid" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o "./dist/$rid"
        done
        cp dist/linux-x64/Torrentarr.Host release/torrentarr-linux-x64
        cp dist/linux-arm64/Torrentarr.Host release/torrentarr-linux-arm64
        cp dist/win-x64/Torrentarr.Host.exe release/torrentarr-windows-x64.exe
        cp dist/osx-x64/Torrentarr.Host release/torrentarr-macos-x64
        cp dist/osx-arm64/Torrentarr.Host release/torrentarr-macos-arm64
    - name: Upload binaries to release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: v${{ needs.prepare_release.outputs.new_version }}
        files: |
          release/torrentarr-linux-x64
          release/torrentarr-linux-arm64
          release/torrentarr-windows-x64.exe
          release/torrentarr-macos-x64
          release/torrentarr-macos-arm64

  build_and_push_docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs:
    - prepare_release
    - create_release
    if: needs.prepare_release.result == 'success'
    env:
      VERSION: ${{ needs.prepare_release.outputs.new_version }}
    steps:
    - id: repo
      uses: ASzc/change-string-case-action@v6
      with:
        string: ${{ github.repository }}
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          feramance/torrentarr
          ghcr.io/${{ steps.repo.outputs.lowercase }}
        tags: |
          type=raw,value=latest
          type=raw,value=v${{ env.VERSION }}
    - name: Build and push Docker images
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  changelog:
    name: Generate changelog and release notes
    runs-on: ubuntu-latest
    needs:
    - prepare_release
    - build_and_push_docker
    if: needs.prepare_release.result == 'success'
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Generate changelog entry
      env:
        VERSION: ${{ needs.prepare_release.outputs.new_version }}
      run: |
        python3 <<'PYEOF'
        import os
        import subprocess
        import sys
        from datetime import datetime
        import re

        version = os.environ['VERSION']
        tag = f"v{version}"

        def categorize_commit(message):
            msg_lower = message.lower()
            if any(x in message for x in ['[minor]', '[major]', 'feat:', 'feature:']):
                return 'Features'
            if 'Add ' in message or 'Implement ' in message:
                return 'Features'
            if any(x in message for x in ['[patch]', 'fix:', 'Fix ', 'Fixed ', 'Hotfix']):
                return 'Bug Fixes'
            if any(x in msg_lower for x in ['docs:', 'doc:', 'document ']):
                return 'Documentation'
            if 'refactor:' in msg_lower or 'Refactor' in message:
                return 'Refactoring'
            if any(x in msg_lower for x in ['perf:', 'performance:', 'optimize:']):
                return 'Performance'
            if any(x in message for x in ['chore:', 'build:', 'ci:', 'Bump ', 'Update ', 'Merge ']):
                return 'Maintenance'
            if message.startswith('Fix '):
                return 'Bug Fixes'
            return 'Maintenance'

        prev_tag = ""
        try:
            result = subprocess.run(['git', 'describe', '--tags', '--abbrev=0', f'{tag}^'],
                                    capture_output=True, text=True)
            if result.returncode == 0:
                prev_tag = result.stdout.strip()
        except:
            pass

        if not prev_tag:
            result = subprocess.run(['git', 'tag', '--sort=-version:refname'],
                                    capture_output=True, text=True)
            if result.returncode == 0:
                tags = [t.strip() for t in result.stdout.strip().split('\n') if t.strip()]
                if tag in tags:
                    idx = tags.index(tag)
                    if idx + 1 < len(tags):
                        prev_tag = tags[idx + 1]
                elif len(tags) > 0:
                    prev_tag = tags[0]

        if prev_tag:
            result = subprocess.run(['git', 'log', f'{prev_tag}..{tag}', '--format=%H %s', '--no-merges'],
                                    capture_output=True, text=True)
        else:
            result = subprocess.run(['git', 'log', '-50', '--format=%H %s', '--no-merges'],
                                    capture_output=True, text=True)

        commits = [line for line in result.stdout.strip().split('\n')
                   if line and '[skip ci]' not in line and '[ci skip]' not in line]

        with open('CHANGELOG.md', 'r') as f:
            content = f.read()

        date_str = datetime.now().strftime('%Y-%m-%d')
        header = f"## v{version} ({date_str})\n"

        if header not in content:
            grouped = {}
            for commit in commits[:50]:
                if not commit.strip():
                    continue
                try:
                    hash_val, msg = commit.split(' ', 1)
                    category = categorize_commit(msg)
                    if category not in grouped:
                        grouped[category] = []
                    grouped[category].append(f"- {msg} ([{hash_val[:7]}](https://github.com/${{ github.repository }}/commit/{hash_val}))")
                except ValueError:
                    continue

            entry = header
            group_order = ['Features', 'Bug Fixes', 'Documentation', 'Refactoring', 'Performance', 'Maintenance']
            for group in group_order:
                if group in grouped:
                    entry += f"\n### {group}\n"
                    for commit_line in grouped[group]:
                        entry += f"{commit_line}\n"

            entry += "\n---\n\n"

            changelog_start = content.find("# Changelog\n\n")
            if changelog_start >= 0:
                insert_pos = changelog_start + len("# Changelog\n\n")
                new_content = content[:insert_pos] + entry + content[insert_pos:]
                with open('CHANGELOG.md', 'w') as f:
                    f.write(new_content)
                print(f"Generated changelog for v{version}")
        PYEOF
    - name: Pull and rebase with local changes
      run: |
        git stash
        git pull --rebase origin master
        git stash pop || true
    - name: Commit changelog updates
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: '[skip ci] Update changelog for v${{ needs.prepare_release.outputs.new_version }}'
        commit_user_name: ${{ github.actor }}
        commit_user_email: ${{ github.actor }}@users.noreply.github.com

  publish_release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
    - prepare_release
    - changelog
    - build_binaries
    if: needs.prepare_release.result == 'success'
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Pull latest changelog updates
      run: git pull origin master
    - name: Extract release notes from changelog
      id: extract_notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ needs.prepare_release.outputs.new_version }}
      run: |
        TAG="v${VERSION}"
        python3 <<'PYEOF'
        import os
        import re
        import sys

        version = os.environ['VERSION']
        tag = f"v{version}"

        with open('CHANGELOG.md', 'r') as f:
            content = f.read()

        pattern = rf'## (v{re.escape(version)}) \((\d{{4}}-\d{{2}}-\d{{2}})\)\n(.*?)(?=\n---\n\n|\Z)'
        match = re.search(pattern, content, re.DOTALL)

        if match:
            body = match.group(3).strip()
            with open('/tmp/release_notes.md', 'w') as f:
                f.write(body)
            print(f"Extracted changelog for {tag}")
        else:
            with open('/tmp/release_notes.md', 'w') as f:
                f.write(f"Release {tag}")
            print(f"No changelog entry found for {tag}")
        PYEOF

        if [ -f /tmp/release_notes.md ]; then
          gh release edit "${TAG}" --notes-file /tmp/release_notes.md --repo ${{ github.repository }} || true
        fi
    - name: Publish release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${{ needs.prepare_release.outputs.new_version }}"
        gh release edit "${TAG}" --draft=false --latest --repo ${{ github.repository }}

concurrency:
  group: release
  cancel-in-progress: false
