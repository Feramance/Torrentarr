# Nightly build: build and push Docker image with tag 'nightly' on a schedule.
# Parity with qBitrr's nightly workflow (scheduled build from master).

name: Nightly

on:
  schedule:
  - cron: 0 0 * * *      # 00:00 UTC daily
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: write

env:
  PROJECT_NAME: Torrentarr

jobs:
  docker_image:
    name: Build and push Docker image (nightly)
    runs-on: ubuntu-latest
    steps:
    - id: repo
      uses: ASzc/change-string-case-action@v6
      with:
        string: ${{ github.repository }}

    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: master
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          feramance/torrentarr
          ghcr.io/${{ steps.repo.outputs.lowercase }}
        tags: |
          type=raw,value=nightly

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
