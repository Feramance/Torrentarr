name: CodeQL

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  schedule:
  - cron: 15 0 * * 5

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
        - csharp
        - javascript-typescript
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set .NET version from repo
      id: dotnet_version
      run: |
        DOTNET_VERSION=$(bash scripts/ensure-global-json.sh "${{ github.workspace }}")
        echo "DOTNET_SDK_VERSION=$DOTNET_VERSION" >> $GITHUB_ENV
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: ${{ env.DOTNET_SDK_VERSION }}.x
    - name: Setup Node.js
      if: matrix.language == 'javascript-typescript'
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
      continue-on-error: true
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      continue-on-error: true
